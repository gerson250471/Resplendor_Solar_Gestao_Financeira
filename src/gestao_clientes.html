<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Clientes - Resplendor Solar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      .card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      .input-field {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        outline: none;
        transition: all 0.2s;
        font-size: 0.9rem;
      }
      .input-field:focus {
        border-color: #2563eb;
        ring: 2px #bfdbfe;
      }
      .btn {
        padding: 8px 16px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-primary {
        background-color: #1d4ed8;
        color: white;
      }
      .btn-primary:hover {
        background-color: #1e40af;
      }
      .btn-outline {
        border: 1px solid #d1d5db;
        color: #4b5563;
      }
      .btn-outline:hover {
        background-color: #f9fafb;
      }
      .btn-danger {
        color: #dc2626;
      }
      .btn-danger:hover {
        background-color: #fef2f2;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background-color: #f9fafb;
        padding: 12px;
        text-align: left;
        font-size: 0.75rem;
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        border-bottom: 2px solid #f3f4f6;
      }
      td {
        padding: 12px;
        font-size: 0.85rem;
        border-bottom: 1px solid #f3f4f6;
        color: #374151;
      }
      tr:hover {
        background-color: #f8fafc;
      }
    </style>
  </head>
  <body class="p-6">
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
            👥 Gestão de Clientes
          </h1>
          <p class="text-slate-500 text-sm italic">
            Ambiente de homologação Resplendor Solar
          </p>
        </div>
        <div class="flex gap-3">
          <div
            class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg flex items-center gap-2"
          >
            <span class="text-xs font-bold uppercase">Total de Registros:</span>
            <span id="contador-clientes" class="text-lg font-black">0</span>
          </div>
          <button onclick="abrirModalNovo()" class="btn btn-primary">
            <span>➕</span> Novo Cliente
          </button>
        </div>
      </div>

      <!-- Barra de Pesquisa -->
      <div class="card p-4 mb-6 flex gap-4">
        <div class="flex-1">
          <input
            type="text"
            id="filtro"
            oninput="filtrarTabela()"
            placeholder="Teste de busca: nome, ID ou cidade..."
            class="input-field"
          />
        </div>
        <button onclick="carregarClientes()" class="btn btn-outline">
          <span>🔄</span> Sincronizar Base
        </button>
      </div>

      <!-- Tabela de Clientes -->
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Descrição / Nome</th>
                <th>Cidade</th>
                <th>Celular</th>
                <th class="text-center">Ações</th>
              </tr>
            </thead>
            <tbody id="corpoTabela">
              <tr>
                <td colspan="5" class="p-10 text-center text-slate-400 italic">
                  Consultando base de dados para testes...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Modal de Formulário -->
      <div
        id="modalCliente"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
      >
        <div
          class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden"
        >
          <div
            class="p-6 border-b flex justify-between items-center bg-slate-50"
          >
            <h2 id="tituloModal" class="font-bold text-slate-800">
              Formulário de Cadastro
            </h2>
            <button
              onclick="fecharModal()"
              class="text-slate-400 hover:text-slate-600 font-bold text-xl"
            >
              &times;
            </button>
          </div>
          <div class="p-6 space-y-4">
            <div class="grid grid-cols-3 gap-4">
              <div class="col-span-1">
                <label
                  class="block text-[10px] font-bold text-slate-400 uppercase"
                  >ID Cliente</label
                >
                <input type="text" id="form-id" class="input-field font-mono" />
              </div>
              <div class="col-span-2">
                <label
                  class="block text-[10px] font-bold text-slate-400 uppercase"
                  >Descrição/Nome</label
                >
                <input type="text" id="form-descricao" class="input-field" />
              </div>
            </div>
            <div>
              <label
                class="block text-[10px] font-bold text-slate-400 uppercase"
                >Endereço</label
              >
              <input type="text" id="form-endereco" class="input-field" />
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label
                  class="block text-[10px] font-bold text-slate-400 uppercase"
                  >Bairro</label
                >
                <input type="text" id="form-bairro" class="input-field" />
              </div>
              <div>
                <label
                  class="block text-[10px] font-bold text-slate-400 uppercase"
                  >Cidade</label
                >
                <input type="text" id="form-cidade" class="input-field" />
              </div>
            </div>
            <div>
              <label
                class="block text-[10px] font-bold text-slate-400 uppercase"
                >Celular</label
              >
              <input type="text" id="form-celular" class="input-field" />
            </div>
          </div>
          <div class="p-6 bg-slate-50 border-t flex justify-end gap-3">
            <button onclick="fecharModal()" class="btn btn-outline">
              Cancelar
            </button>
            <button onclick="salvarFormulario()" class="btn btn-primary">
              Gravar Dados
            </button>
          </div>
        </div>
      </div>

      <div class="mt-8 text-center">
        <p
          class="text-[10px] text-gray-400 font-bold uppercase tracking-widest"
        >
          MAJB SISTEMAS • PROTOCOLO DE TESTES V1.0
        </p>
      </div>
    </div>

    <script>
      let clientesGlobal = [];

      window.onload = carregarClientes;

      function carregarClientes() {
        const corpo = document.getElementById("corpoTabela");
        corpo.innerHTML =
          '<tr><td colspan="5" class="p-10 text-center animate-pulse">Sincronizando dados importados...</td></tr>';

        google.script.run
          .withSuccessHandler(function (dados) {
            clientesGlobal = dados;
            renderizarTabela(dados);
          })
          .getListaClientes();
      }

      function renderizarTabela(lista) {
        const corpo = document.getElementById("corpoTabela");
        const contador = document.getElementById("contador-clientes");
        corpo.innerHTML = "";
        contador.innerText = lista.length;

        if (lista.length === 0) {
          corpo.innerHTML =
            '<tr><td colspan="5" class="p-10 text-center text-slate-400 italic">Nenhum dado encontrado na planilha de destino.</td></tr>';
          return;
        }

        lista.forEach((c) => {
          corpo.innerHTML += `
          <tr>
            <td class="font-mono font-bold text-blue-600">${c.id}</td>
            <td class="font-medium">${c.descricao || '<span class="text-red-400">Sem Nome</span>'}</td>
            <td>${c.cidade || "-"}</td>
            <td class="text-slate-500 font-mono">${c.celular || "-"}</td>
            <td class="flex justify-center gap-2">
              <button onclick="editarCliente('${c.id}')" class="btn btn-outline py-1 px-2 text-[11px]" title="Validar Edição">✏️</button>
              <button onclick="excluirCliente('${c.id}', '${c.descricao}')" class="btn btn-danger py-1 px-2 text-[11px]" title="Testar Exclusão">🗑️</button>
            </td>
          </tr>
        `;
        });
      }

      function filtrarTabela() {
        const termo = document.getElementById("filtro").value.toLowerCase();
        const filtrados = clientesGlobal.filter(
          (c) =>
            (c.descricao && c.descricao.toLowerCase().includes(termo)) ||
            (c.id && c.id.toString().includes(termo)) ||
            (c.cidade && c.cidade.toLowerCase().includes(termo)),
        );
        renderizarTabela(filtrados);
      }

      function abrirModalNovo() {
        document.getElementById("tituloModal").innerText =
          "Novo Registro (Teste de Inserção)";
        limparCampos();
        document.getElementById("form-id").disabled = false;
        document.getElementById("modalCliente").classList.remove("hidden");
      }

      function editarCliente(id) {
        const cliente = clientesGlobal.find(
          (c) => c.id.toString() === id.toString(),
        );
        if (!cliente) return;

        document.getElementById("tituloModal").innerText =
          "Editar Registro (Teste de Update)";
        document.getElementById("form-id").value = cliente.id;
        document.getElementById("form-id").disabled = true;
        document.getElementById("form-descricao").value = cliente.descricao;
        document.getElementById("form-endereco").value = cliente.endereco;
        document.getElementById("form-bairro").value = cliente.bairro;
        document.getElementById("form-cidade").value = cliente.cidade;
        document.getElementById("form-celular").value = cliente.celular;

        document.getElementById("modalCliente").classList.remove("hidden");
      }

      function fecharModal() {
        document.getElementById("modalCliente").classList.add("hidden");
      }

      function limparCampos() {
        document
          .querySelectorAll("#modalCliente input")
          .forEach((i) => (i.value = ""));
      }

      function salvarFormulario() {
        const dados = {
          id: document.getElementById("form-id").value,
          descricao: document.getElementById("form-descricao").value,
          endereco: document.getElementById("form-endereco").value,
          bairro: document.getElementById("form-bairro").value,
          cidade: document.getElementById("form-cidade").value,
          celular: document.getElementById("form-celular").value,
        };

        if (!dados.id || !dados.descricao) {
          alert("Campos obrigatórios ausentes no teste.");
          return;
        }

        google.script.run
          .withSuccessHandler(function (res) {
            alert(res.mensagem);
            fecharModal();
            carregarClientes();
          })
          .salvarOuAtualizarCliente(dados);
      }

      function excluirCliente(id, nome) {
        if (
          confirm(
            `TESTE DE EXCLUSÃO: Deseja apagar "${nome}" permanentemente da planilha?`,
          )
        ) {
          google.script.run
            .withSuccessHandler(function (res) {
              alert(res.mensagem);
              carregarClientes();
            })
            .eliminarCliente(id);
        }
      }
    </script>
  </body>
</html>
