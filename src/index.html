    <script>
      lucide.createIcons();
      google.charts.load("current", { packages: ["corechart"] });

      // 1. LÓGICA DE LOGIN COM TRAVA DE SEGURANÇA
      function fazerLogin() {
        const usuario = document.getElementById("user-login").value;
        const senha = document.getElementById("pass-login").value;
        if (!usuario || !senha) {
          mostrarToast("Preencha todos os campos", "erro");
          return;
        }

        mostrarToast("Validando acesso...", "info");

        google.script.run
          .withSuccessHandler((res) => {
            if (res.sucesso) {
              // Salva os dados na sessão do navegador para uso posterior
              sessionStorage.setItem("usuarioAtivo", usuario);
              sessionStorage.setItem("nivelAcesso", res.nivel);

              document.getElementById("login-overlay").style.display = "none";

              // Verifica se o servidor sinalizou a troca de senha
              if (res.precisaTrocar) {
                navegarPara("troca-senha");
                mostrarToast(
                  "Ação necessária: Altere sua senha inicial.",
                  "info",
                );
              } else {
                navegarPara("dashboard");
                mostrarToast("Bem-vindo, " + res.nome);
              }
            } else {
              mostrarToast(res.mensagem, "erro");
            }
          })
          .validarAcesso(usuario, senha);
      }

      // 2. LÓGICA PARA GRAVAR A NOVA SENHA
      function salvarNovaSenha() {
        const nova = document.getElementById("nova-senha").value;
        const confirma = document.getElementById("confirma-senha").value;
        const usuario = sessionStorage.getItem("usuarioAtivo");

        if (nova.length < 4) {
          mostrarToast("A senha deve ter no mínimo 4 caracteres.", "erro");
          return;
        }
        if (nova !== confirma) {
          mostrarToast("As senhas digitadas não coincidem.", "erro");
          return;
        }

        mostrarToast("Atualizando segurança...", "info");

        google.script.run
          .withSuccessHandler((sucesso) => {
            if (sucesso) {
              mostrarToast("Senha atualizada com sucesso!");
              navegarPara("dashboard");
            } else {
              mostrarToast(
                "Erro ao gravar nova senha. Tente novamente.",
                "erro",
              );
            }
          })
          .atualizarSenhaDefinitiva(usuario, nova);
      }

      // 3. CARREGAMENTO DO DASHBOARD E GRÁFICOS
      function carregarDashboard() {
        const dashTotal = document.getElementById("dash-total");
        if (dashTotal) dashTotal.innerText = "Carregando...";

        google.script.run
          .withSuccessHandler((res) => {
            if (res.sucesso) {
              document.getElementById("dash-total").innerText =
                "R$ " + res.dados.total;
              document.getElementById("dash-vendas").innerText =
                res.dados.vendasMes;
              document.getElementById("dash-aberto").innerText =
                res.dados.aberto;
              document.getElementById("dash-urgente").innerText =
                res.dados.urgente;
              document.getElementById("dash-atraso").innerText =
                res.dados.atraso;

              if (
                google.visualization &&
                google.visualization.arrayToDataTable
              ) {
                const dataPagas = google.visualization.arrayToDataTable(
                  res.graficos.pagas,
                );
                const chartPagas = new google.visualization.ColumnChart(
                  document.getElementById("grafico_pagas"),
                );
                chartPagas.draw(dataPagas, {
                  legend: { position: "none" },
                  animation: { startup: true, duration: 1000, easing: "out" },
                });

                const dataReceber = google.visualization.arrayToDataTable(
                  res.graficos.receber,
                );
                const chartReceber = new google.visualization.ColumnChart(
                  document.getElementById("grafico_receber"),
                );
                chartReceber.draw(dataReceber, {
                  legend: { position: "none" },
                  animation: { startup: true, duration: 1000, easing: "out" },
                });
              }
            } else {
              mostrarToast(
                "Erro ao carregar gráficos: " + res.mensagem,
                "erro",
              );
            }
          })
          .withFailureHandler((err) => {
            mostrarToast("Erro de comunicação: " + err.message, "erro");
          })
          .getResumoFinanceiro();
      }

      function navegarPara(tela) {
        document
          .querySelectorAll(".page-view")
          .forEach((el) => el.classList.remove("active"));
        const view = document.getElementById(`view-${tela}`);
        if (view) view.classList.add("active");

        // Gatilhos de carregamento
        if (tela === "dashboard") carregarDashboard();
        if (tela === "clientes") carregarListaClientes();
        if (tela === "financeiro") carregarProximoIdVenda();
        if (tela === "pagamentos") carregarParcelasPendentes();
      }

      function mostrarToast(msg, tipo = "sucesso") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        const cor =
          tipo === "erro"
            ? "bg-red-600"
            : tipo === "info"
              ? "bg-blue-600"
              : "bg-emerald-600";
        toast.className = `p-4 text-white rounded-xl shadow-2xl font-semibold text-sm ${cor} animate-bounce transition-all`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
      }

      window.onload = () => {
        console.log("Interface MAJB Sistemas v1.5.2 carregada.");
      };
    </script>
