    <script>
      lucide.createIcons();

      // --- SISTEMA DE NOTIFICAÇÃO TOAST ---
      function mostrarToast(mensagem, tipo = "sucesso") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");

        let bgColor, icone;
        if (tipo === "sucesso") {
          bgColor = "bg-green-600";
          icone = `<svg class="w-5 h-5 mr-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
        } else if (tipo === "erro") {
          bgColor = "bg-red-600";
          icone = `<svg class="w-5 h-5 mr-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        } else {
          bgColor = "bg-blue-600";
          icone = `<svg class="w-5 h-5 mr-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        }

        toast.className = `toast-enter flex items-center p-4 w-72 md:w-80 rounded-lg shadow-xl text-white font-medium text-sm ${bgColor}`;
        toast.innerHTML = `${icone} <span>${mensagem}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.replace("toast-enter", "toast-exit");
          setTimeout(() => {
            toast.remove();
          }, 300);
        }, 3500);
      }

      // --- VARIÁVEIS GLOBAIS ---
      let listaCli = [];
      let idClienteParaExcluir = null;
      let listaPagamentos = [];
      let statusFiltroAtivo = ""; // Variável nova para controlar o filtro do Dashboard

      // --- NAVEGAÇÃO SPA ---
      function navegarPara(tela) {
        document
          .querySelectorAll(".page-view")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById(`view-${tela}`).classList.add("active");

        if (tela === "dashboard") carregarDashboard();
        if (tela === "clientes") carregarListaClientes();
        if (tela === "financeiro") carregarProximoIdVenda();
        if (tela === "pagamentos") carregarParcelasPendentes();
      }

      // --- FUNÇÕES DO DASHBOARD ---
      function carregarDashboard() {
        const ids = [
          "dash-total",
          "dash-vendas",
          "dash-aberto",
          "dash-urgente",
          "dash-atraso",
        ];
        ids.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.innerText = "...";
        });

        google.script.run
          .withSuccessHandler((res) => {
            if (res.sucesso) {
              const atualizarSeExistir = (id, valor) => {
                const el = document.getElementById(id);
                if (el) el.innerText = valor;
              };

              atualizarSeExistir("dash-total", `R$ ${res.dados.total}`);
              atualizarSeExistir("dash-vendas", res.dados.vendasMes);
              atualizarSeExistir("dash-aberto", res.dados.aberto);
              atualizarSeExistir("dash-urgente", res.dados.urgente);
              atualizarSeExistir("dash-atraso", res.dados.atraso);

              lucide.createIcons();
            } else {
              mostrarToast(
                "Erro ao carregar Dashboard: " + res.mensagem,
                "erro",
              );
            }
          })
          .getResumoFinanceiro();
      }

      // --- INTEGRAÇÃO DASHBOARD -> PAGAMENTOS ---
      function abrirFiltroStatus(status) {
        statusFiltroAtivo = status;
        const campoBusca = document.getElementById("filtro-pagamentos");
        if (campoBusca) campoBusca.value = ""; // Limpa a busca digitada
        navegarPara("pagamentos");
      }

      function limparFiltroStatus() {
        statusFiltroAtivo = "";
        aplicarFiltrosPagamentos();
      }

      function atualizarBadgeFiltro() {
        const badge = document.getElementById("badge-filtro");
        if (!badge) return;

        if (statusFiltroAtivo) {
          let cor =
            statusFiltroAtivo === "EM ATRASO"
              ? "bg-red-100 text-red-700 border-red-200"
              : statusFiltroAtivo === "URGENTE"
                ? "bg-amber-100 text-amber-700 border-amber-200"
                : "bg-emerald-100 text-emerald-700 border-emerald-200";

          badge.innerHTML = `<span class="px-3 py-1 text-xs font-bold rounded-full border ${cor}">Filtrando: ${statusFiltroAtivo}</span>
                             <button onclick="limparFiltroStatus()" class="text-xs text-slate-500 hover:text-red-600 underline ml-2 transition-colors">Remover Filtro</button>`;
          badge.classList.remove("hidden");
        } else {
          badge.classList.add("hidden");
          badge.innerHTML = "";
        }
      }

      // --- FUNÇÕES DE CLIENTES ---
      function gerarProximoId() {
        if (!listaCli || listaCli.length === 0) return "CLI-1";
        let maxNum = 0;
        listaCli.forEach((c) => {
          const idStr = String(c.id).trim();
          if (idStr.startsWith("CLI-")) {
            const num = parseInt(idStr.replace("CLI-", ""), 10);
            if (!isNaN(num) && num > maxNum) maxNum = num;
          }
        });
        return `CLI-${maxNum + 1}`;
      }

      function limparFormularioCliente() {
        document
          .querySelectorAll("#view-clientes input")
          .forEach((i) => (i.value = ""));
        document.getElementById("cli-cidade").value = "Taubaté";
        document.getElementById("cli-id").value = gerarProximoId();
        document.getElementById("cli-id").removeAttribute("readonly");
        document
          .getElementById("cli-id")
          .classList.remove("bg-slate-100", "text-slate-500");

        const btnSalvar = document.getElementById("btnSalvarCliente");
        btnSalvar.innerText = "Salvar Cadastro";
        btnSalvar.classList.replace("bg-blue-600", "bg-green-600");
        btnSalvar.classList.replace("hover:bg-blue-700", "hover:bg-green-700");
        btnSalvar.disabled = false;

        document.getElementById("btnCancelarCliente").classList.add("hidden");
      }

      function salvarNovoCliente() {
        const btn = document.getElementById("btnSalvarCliente");
        const nomeDigitado = String(
          document.getElementById("cli-nome").value,
        ).trim();
        const celularDigitado = String(
          document.getElementById("cli-celular").value,
        ).trim();
        let idDigitado = String(document.getElementById("cli-id").value).trim();

        if (!idDigitado || !nomeDigitado) {
          mostrarToast("Atenção: ID e Nome são obrigatórios.", "erro");
          return;
        }

        const isEditando = document
          .getElementById("cli-id")
          .hasAttribute("readonly");
        if (!isEditando && celularDigitado !== "") {
          const clienteExistente = listaCli.find(
            (c) =>
              c.descricao.toLowerCase() === nomeDigitado.toLowerCase() &&
              c.celular === celularDigitado,
          );
          if (clienteExistente) {
            idDigitado = clienteExistente.id;
            mostrarToast("Cliente encontrado! Atualizando cadastro...", "info");
          }
        }

        const dados = {
          id: idDigitado,
          descricao: nomeDigitado,
          celular: celularDigitado,
          cidade: String(document.getElementById("cli-cidade").value).trim(),
          bairro: String(document.getElementById("cli-bairro").value).trim(),
          endereco: String(
            document.getElementById("cli-endereco").value,
          ).trim(),
        };

        btn.disabled = true;
        btn.innerText = "Salvando...";

        google.script.run
          .withSuccessHandler((res) => {
            mostrarToast(res.mensagem, "sucesso");
            limparFormularioCliente();
            carregarListaClientes();
          })
          .salvarCliente(dados);
      }

      function atualizarDataListClientes(lista) {
        const datalist = document.getElementById("clientes-list");
        if (datalist) {
          datalist.innerHTML = lista
            .map((c) => `<option value="${c.descricao}">`)
            .join("");
        }
      }

      function carregarListaClientes() {
        const tbody = document.getElementById("tabela-cli");
        if (tbody)
          tbody.innerHTML =
            '<tr><td colspan="4" class="p-4 text-center text-slate-400 text-sm">Atualizando base de dados...</td></tr>';

        google.script.run
          .withSuccessHandler((res) => {
            if (res.sucesso && res.dados.length > 0) {
              listaCli = res.dados;
              if (tbody) renderizarTabelaClientes(listaCli);
              atualizarDataListClientes(listaCli);
            } else {
              listaCli = [];
              if (tbody)
                tbody.innerHTML =
                  '<tr><td colspan="4" class="p-4 text-center text-slate-400 text-sm">Nenhum cliente encontrado.</td></tr>';
            }
            if (
              document.getElementById("cli-id") &&
              !document.getElementById("cli-id").hasAttribute("readonly")
            ) {
              document.getElementById("cli-id").value = gerarProximoId();
            }
          })
          .listarClientes();
      }

      function renderizarTabelaClientes(lista) {
        const corpo = document.getElementById("tabela-cli");
        if (!corpo) return;

        if (lista.length === 0) {
          corpo.innerHTML =
            '<tr><td colspan="4" class="p-10 text-center text-slate-400">Nenhum cliente encontrado na pesquisa.</td></tr>';
          return;
        }
        corpo.innerHTML = lista
          .map(
            (c) => `
          <tr class="hover:bg-slate-50 transition-colors group border-b border-slate-100">
              <td class="p-4 font-mono font-bold text-blue-600 text-sm">${c.id}</td>
              <td class="p-4 font-medium text-slate-800 text-sm">${c.descricao}</td>
              <td class="p-4 text-slate-500 text-sm">${c.cidade || "-"}</td>
              <td class="p-4 text-center flex justify-center gap-2">
                  <button onclick="editarCliente('${c.id}')" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">EDITAR</button>
                  <button onclick="abrirModalExclusao('${c.id}', '${c.descricao}')" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-red-600 hover:text-white transition-all shadow-sm">EXCLUIR</button>
              </td>
          </tr>
        `,
          )
          .join("");
      }

      function filtrarClientes() {
        const termo = document.getElementById("filtro-cli").value.toLowerCase();
        if (termo === "") {
          renderizarTabelaClientes(listaCli);
          return;
        }
        const filtrados = listaCli.filter(
          (c) =>
            c.descricao.toLowerCase().includes(termo) ||
            c.id.toString().includes(termo) ||
            (c.cidade && c.cidade.toLowerCase().includes(termo)),
        );
        renderizarTabelaClientes(filtrados);
      }

      function editarCliente(id) {
        const cliente = listaCli.find((c) => c.id.toString() === id.toString());
        if (cliente) {
          document.getElementById("cli-id").value = cliente.id;
          document.getElementById("cli-nome").value = cliente.descricao;
          document.getElementById("cli-celular").value = cliente.celular;
          document.getElementById("cli-cidade").value = cliente.cidade;
          document.getElementById("cli-bairro").value = cliente.bairro;
          document.getElementById("cli-endereco").value = cliente.endereco;

          document.getElementById("cli-id").setAttribute("readonly", true);
          document
            .getElementById("cli-id")
            .classList.add("bg-slate-100", "text-slate-500");

          const btnSalvar = document.getElementById("btnSalvarCliente");
          btnSalvar.innerText = "Atualizar Cadastro";
          btnSalvar.classList.replace("bg-green-600", "bg-blue-600");
          btnSalvar.classList.replace(
            "hover:bg-green-700",
            "hover:bg-blue-700",
          );

          document
            .getElementById("btnCancelarCliente")
            .classList.remove("hidden");
          document
            .getElementById("cli-id")
            .scrollIntoView({ behavior: "smooth" });
        }
      }

      function abrirModalExclusao(id, nome) {
        idClienteParaExcluir = id;
        document.getElementById("msg-exclusao-modal").innerHTML =
          `Deseja realmente remover o cliente <b>${nome}</b>?`;
        const modal = document.getElementById("modal-exclusao");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function fecharModalExclusao() {
        idClienteParaExcluir = null;
        const modal = document.getElementById("modal-exclusao");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }

      function confirmarExclusao() {
        if (!idClienteParaExcluir) return;
        const idSalvo = idClienteParaExcluir;
        fecharModalExclusao();
        mostrarToast("A processar exclusão...", "info");

        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.sucesso) {
              mostrarToast(res.mensagem, "sucesso");
              carregarListaClientes();
            } else {
              mostrarToast(res.mensagem || "Erro ao excluir", "erro");
            }
          })
          .withFailureHandler((err) => {
            mostrarToast("Erro técnico: " + (err.message || err), "erro");
          })
          .eliminarCliente(idSalvo);
      }

      // --- FUNÇÕES FINANCEIRO ---
      let parcelasAtuais = [];

      function carregarProximoIdVenda() {
        const inputId = document.getElementById("fin-idVenda");
        inputId.value = "A gerar...";
        google.script.run
          .withSuccessHandler((res) => {
            if (res.sucesso) {
              inputId.value = res.id;
            } else {
              mostrarToast("Erro ao gerar ID: " + res.mensagem, "erro");
              inputId.removeAttribute("readonly");
              inputId.classList.remove("bg-slate-100");
              inputId.value = "";
            }
          })
          .obterProximoIdVenda();
      }

      function verificarMetodoPagamento() {
        const selectMetodo = document.getElementById("fin-metodo");
        const selectParcelas = document.getElementById("fin-parcelas");

        if (!selectMetodo || !selectParcelas) return;

        const metodo = selectMetodo.value;
        const metodosAVista = [
          "BOLETO À VISTA",
          "CARTÃO À VISTA",
          "ESPECIE / PIX",
        ];

        if (metodosAVista.includes(metodo)) {
          selectParcelas.value = "1";
          selectParcelas.disabled = true;
          gerarParcelas();
        } else {
          selectParcelas.disabled = false;
        }
      }

      function gerarParcelas() {
        const valorTotal = parseFloat(
          document.getElementById("fin-valor").value,
        );
        const qtd = parseInt(document.getElementById("fin-parcelas").value);
        const inputDataVenc = document.getElementById("fin-data-primeiro-venc");
        const tbody = document.getElementById("lista-parcelas");

        if (!valorTotal || valorTotal <= 0) {
          tbody.innerHTML =
            '<tr><td colspan="3" class="pt-2 text-center text-slate-400">Informe o valor total.</td></tr>';
          return;
        }

        const valorBase = Math.floor((valorTotal / qtd) * 100) / 100;
        const resto = parseFloat((valorTotal - valorBase * qtd).toFixed(2));
        parcelasAtuais = [];
        let html = "";

        // 🚀 NOVIDADE: Lógica do 1º Vencimento
        let dataBase = new Date(); // Padrão é hoje
        if (inputDataVenc && inputDataVenc.value) {
          const partes = inputDataVenc.value.split("-");
          // Instanciar assim: new Date(Ano, Mês - 1, Dia) evita bugs de fuso horário
          dataBase = new Date(partes[0], partes[1] - 1, partes[2]);
        }

        for (let i = 1; i <= qtd; i++) {
          let valorParcela = i === 1 ? valorBase + resto : valorBase;

          let vencimento = new Date(dataBase);
          // Adiciona 1 mês para cada parcela, começando da data informada pelo cliente!
          vencimento.setMonth(vencimento.getMonth() + (i - 1));

          let dataStr = vencimento.toISOString().split("T")[0];

          parcelasAtuais.push({
            numero: i,
            vencimento: dataStr,
            valor: valorParcela,
            status: "PENDENTE",
          });

          html += `
            <tr class="border-b border-slate-100 last:border-0">
              <td class="py-2 text-slate-600 font-medium">${i}</td>
              <td class="py-2"><input type="date" value="${dataStr}" class="border rounded px-2 py-1 text-sm bg-white" disabled></td>
              <td class="py-2 text-right font-mono font-bold text-slate-800">R$ ${valorParcela.toFixed(2)}</td>
            </tr>
          `;
        }
        tbody.innerHTML = html;
      }

      function salvarVenda() {
        const selectParcelas = document.getElementById("fin-parcelas");
        const textoParcelas =
          selectParcelas.options[selectParcelas.selectedIndex].text;
        const metodoPagamento = document.getElementById("fin-metodo").value;

        const nomeClienteDigitado = String(
          document.getElementById("fin-cliente").value,
        ).trim();
        const idVenda = String(
          document.getElementById("fin-idVenda").value,
        ).trim();
        const valorTotal = parseFloat(
          document.getElementById("fin-valor").value,
        );

        if (
          !idVenda ||
          !nomeClienteDigitado ||
          !valorTotal ||
          parcelasAtuais.length === 0
        ) {
          mostrarToast("Preencha ID, Cliente e Valor corretamente.", "erro");
          return;
        }

        const clienteValido = listaCli.find(
          (c) =>
            c.descricao.toLowerCase() === nomeClienteDigitado.toLowerCase(),
        );

        if (!clienteValido) {
          mostrarToast(
            "Cliente não encontrado! Por favor, cadastre o cliente em 'Gestão de Clientes' antes de prosseguir.",
            "erro",
          );
          return;
        }

        const venda = {
          idVenda: idVenda,
          cliente: clienteValido.descricao,
          valorTotal: valorTotal,
          formaPagamento: `${metodoPagamento} (${textoParcelas})`,
          saldoDevedor: valorTotal,
          status: "EM ABERTO",
        };

        const btn = document.getElementById("btnSalvarVenda");
        btn.disabled = true;
        btn.innerText = "A processar...";

        google.script.run
          .withSuccessHandler((res) => {
            mostrarToast(res.mensagem, "sucesso");
            btn.disabled = false;
            btn.innerText = "Gravar Lançamento";

            document
              .querySelectorAll("#view-financeiro input")
              .forEach((i) => (i.value = ""));
            document.getElementById("fin-metodo").selectedIndex = 0;
            document.getElementById("fin-parcelas").selectedIndex = 0;
            document.getElementById("fin-parcelas").disabled = false;
            document.getElementById("lista-parcelas").innerHTML = "";
            // ... logo abaixo da linha: document.getElementById("lista-parcelas").innerHTML = "";
            const campoData = document.getElementById("fin-data-primeiro-venc");
            if (campoData)
              campoData.value = new Date().toLocaleDateString("en-CA");
            carregarProximoIdVenda();
          })
          .withFailureHandler((err) => {
            mostrarToast("Erro técnico: " + err, "erro");
            btn.disabled = false;
            btn.innerText = "Gravar Lançamento";
          })
          .processarGravacao(venda, parcelasAtuais);
      }

      // --- FUNÇÕES DE CONFIRMAÇÃO DE PAGAMENTO ---
      function carregarParcelasPendentes() {
        const tbody = document.getElementById("tabela-pagamentos");
        if (tbody)
          tbody.innerHTML =
            '<tr><td colspan="6" class="p-4 text-center text-slate-400 text-sm">Atualizando pendências...</td></tr>';

        google.script.run
          .withSuccessHandler((res) => {
            if (res.sucesso && res.dados.length > 0) {
              listaPagamentos = res.dados;
              aplicarFiltrosPagamentos(); // Envia para a central de filtros
            } else {
              listaPagamentos = [];
              if (tbody)
                tbody.innerHTML =
                  '<tr><td colspan="6" class="p-10 text-center text-slate-400">Nenhuma parcela pendente encontrada. Aleluia!</td></tr>';
              atualizarBadgeFiltro();
            }
          })
          .listarParcelasPendentes();
      }

      // NOVO: Central unificada de filtros (Texto + Status do Cartão)
      function aplicarFiltrosPagamentos() {
        atualizarBadgeFiltro();
        let filtrados = listaPagamentos;

        if (statusFiltroAtivo) {
          filtrados = filtrados.filter((p) => p.status === statusFiltroAtivo);
        }

        const campoFiltro = document.getElementById("filtro-pagamentos");
        if (campoFiltro) {
          const termo = campoFiltro.value.toLowerCase();
          if (termo !== "") {
            filtrados = filtrados.filter(
              (p) =>
                p.cliente.toLowerCase().includes(termo) ||
                p.idVenda.toLowerCase().includes(termo),
            );
          }
        }

        renderizarTabelaPagamentos(filtrados);
      }

      // Quando o cliente digitar algo, aciona a central unificada
      function filtrarPagamentos() {
        aplicarFiltrosPagamentos();
      }

      function renderizarTabelaPagamentos(lista) {
        const corpo = document.getElementById("tabela-pagamentos");
        if (!corpo) return;

        if (lista.length === 0) {
          corpo.innerHTML =
            '<tr><td colspan="6" class="p-10 text-center text-slate-400">Nenhum resultado para a pesquisa ou filtro.</td></tr>';
          return;
        }

        corpo.innerHTML = lista
          .map((p) => {
            const [ano, mes, dia] = p.vencimento.split("-");
            const dataBR = `${dia}/${mes}/${ano}`;
            const valorFmt = parseFloat(p.valor).toLocaleString("pt-BR", {
              style: "currency",
              currency: "BRL",
            });

            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            const dataVenc = new Date(ano, mes - 1, dia);
            const isAtrasado = dataVenc < hoje;
            const corTextoData = isAtrasado
              ? "text-red-600 font-bold"
              : "text-slate-600";

            return `
          <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100">
              <td class="p-4 font-mono font-bold text-blue-600 text-sm">${p.idVenda}</td>
              <td class="p-4 font-medium text-slate-800 text-sm">${p.cliente}</td>
              <td class="p-4 text-slate-500 text-sm">Nº ${p.numero}</td>
              <td class="p-4 text-sm ${corTextoData}">${dataBR} ${isAtrasado ? '<span class="text-[10px] bg-red-100 px-2 py-0.5 rounded ml-1 text-red-700">Atrasado</span>' : ""}</td>
              <td class="p-4 text-right font-mono font-bold text-slate-800 text-sm">${valorFmt}</td>
              <td class="p-4 text-center">
                  <button onclick="confirmarBaixa('${p.idVenda}', ${p.numero})" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-600 hover:text-white transition-all shadow-sm flex items-center justify-center mx-auto gap-1">
                    <i data-lucide="check" class="w-3 h-3"></i> DAR BAIXA
                  </button>
              </td>
          </tr>
        `;
          })
          .join("");

        lucide.createIcons();
      }

      function confirmarBaixa(idVenda, numero) {
        if (
          confirm(
            `Confirma o recebimento da parcela Nº ${numero} da venda ${idVenda}?`,
          )
        ) {
          mostrarToast("A processar pagamento...", "info");

          google.script.run
            .withSuccessHandler((res) => {
              if (res.sucesso) {
                mostrarToast(res.mensagem, "sucesso");
                carregarParcelasPendentes();
                carregarDashboard();
              } else {
                mostrarToast("Erro: " + res.mensagem, "erro");
              }
            })
            .confirmarPagamentoParcela(idVenda, numero);
        }
      }

      // --- INICIALIZAÇÃO DA PÁGINA ---
      window.onload = () => {
        carregarDashboard();
        carregarListaClientes();

        const selectMetodo = document.getElementById("fin-metodo");
        if (selectMetodo) {
          selectMetodo.addEventListener("change", verificarMetodoPagamento);
        }
        const campoData = document.getElementById("fin-data-primeiro-venc");
        // O formato 'en-CA' força o padrão YYYY-MM-DD que o input type="date" exige
        if (campoData) campoData.value = new Date().toLocaleDateString("en-CA");
      };
    </script>
  </body>
</html>
