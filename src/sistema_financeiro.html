<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo Lançamento - Resplendor Solar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      .card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      .input-field {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        margin-top: 4px;
        outline: none;
        transition: border-color 0.2s;
      }
      .input-field:focus {
        border-color: #2563eb;
      }
      .btn-primary {
        background-color: #1d4ed8;
        color: white;
        padding: 12px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }
      .btn-primary:hover {
        background-color: #1e40af;
      }
      .btn-primary:disabled {
        background-color: #9ca3af;
      }
      .status-badge {
        padding: 4px 8px;
        border-radius: 9999px;
        font-size: 0.75rem;
        background-color: #fef3c7;
        color: #92400e;
      }
    </style>
  </head>
  <body class="p-4" onload="carregarListaClientes()">
    <div class="max-w-4xl mx-auto">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-xl font-bold text-gray-800">
          📝 Novo Lançamento - Resplendor Solar
        </h1>
        <div
          id="loading"
          class="hidden text-blue-600 animate-pulse text-sm font-medium"
        >
          Processando...
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- DADOS PAI -->
        <div class="md:col-span-1 space-y-4">
          <div class="card p-5">
            <label
              class="block text-xs font-bold text-gray-500 uppercase tracking-wider"
              >ID Venda / Contrato</label
            >
            <input
              type="text"
              id="idVenda"
              class="input-field mb-3"
              placeholder="Ex: 2025-001"
            />

            <label
              class="block text-xs font-bold text-gray-500 uppercase tracking-wider"
              >Cliente (Pesquisa)</label
            >
            <input
              list="clientesRegistados"
              id="cliente"
              class="input-field mb-3"
              placeholder="Digite para pesquisar..."
            />
            <datalist id="clientesRegistados">
              <!-- Preenchido via Backend -->
            </datalist>

            <label
              class="block text-xs font-bold text-gray-500 uppercase tracking-wider"
              >Data da Venda</label
            >
            <input type="date" id="dataVenda" class="input-field mb-3" />

            <label
              class="block text-xs font-bold text-gray-500 uppercase tracking-wider"
              >Forma de Pagamento</label
            >
            <select
              id="formaPagamento"
              class="input-field mb-3"
              onchange="validarPagamento()"
            >
              <option value="">Selecione...</option>
              <option value="BOLETO À VISTA">BOLETO À VISTA</option>
              <option value="BOLETO PARCELADO">BOLETO PARCELADO</option>
              <option value="CARTÃO À VISTA">CARTÃO À VISTA</option>
              <option value="CARTÃO PARCELADO">CARTÃO PARCELADO</option>
              <option value="CHEQUE">CHEQUE</option>
              <option value="CREDIÁRIO">CREDIÁRIO</option>
              <option value="ESPECIE / PIX">ESPECIE / PIX</option>
            </select>

            <label
              class="block text-xs font-bold text-gray-500 uppercase tracking-wider"
              >Valor Total do Projeto</label
            >
            <input
              type="number"
              id="valorTotal"
              step="0.01"
              class="input-field mb-3 text-blue-700 font-bold"
              oninput="gerarParcelas()"
            />

            <label
              class="block text-xs font-bold text-gray-500 uppercase tracking-wider"
              >Qtd. Prestações</label
            >
            <select
              id="qtdParcelas"
              class="input-field"
              onchange="gerarParcelas()"
            >
              <option value="1">1x (À Vista)</option>
              <option value="2">2x</option>
              <option value="3">3x</option>
              <option value="4">4x</option>
              <option value="5">5x</option>
              <option value="6">6x</option>
              <option value="12">12x</option>
              <option value="24">24x</option>
              <option value="36">36x</option>
            </select>
          </div>
          <button
            id="btnSalvar"
            onclick="salvar()"
            class="btn-primary shadow-md"
          >
            💾 Gravar Lançamento
          </button>
        </div>

        <!-- SUB-FORMULÁRIO (FILHO) -->
        <div class="md:col-span-2">
          <div class="card p-5 min-h-[480px]">
            <h2
              class="font-bold text-gray-700 mb-4 border-b pb-2 flex justify-between"
            >
              <span>Prestações Geradas</span>
              <span id="labelSoma" class="text-blue-600 text-xs"
                >Soma: R$ 0,00</span
              >
            </h2>
            <table class="w-full text-left text-sm">
              <thead
                class="bg-gray-50 text-gray-500 uppercase text-[10px] tracking-widest"
              >
                <tr>
                  <th class="p-2">Nº</th>
                  <th class="p-2">Vencimento</th>
                  <th class="p-2 text-right">Valor Parcela</th>
                  <th class="p-2 text-center">Ações</th>
                </tr>
              </thead>
              <tbody id="listaParcelas" class="divide-y">
                <tr>
                  <td colspan="4" class="p-10 text-center text-gray-400 italic">
                    Preencha o valor e o cliente para gerar o cronograma...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("dataVenda").valueAsDate = new Date();

      /**
       * Carrega a lista de clientes registados na aba 'Clientes'
       */
      function carregarListaClientes() {
        google.script.run
          .withSuccessHandler(function (clientes) {
            const datalist = document.getElementById("clientesRegistados");
            datalist.innerHTML = "";
            clientes.forEach((c) => {
              const option = document.createElement("option");
              option.value = c.descricao; // Usamos a descrição como valor principal
              datalist.appendChild(option);
            });
          })
          .getListaClientes();
      }

      function validarPagamento() {
        const f = document.getElementById("formaPagamento").value;
        const q = document.getElementById("qtdParcelas");
        if (f.includes("À VISTA") || f.includes("PIX")) {
          q.value = "1";
          q.disabled = true;
        } else {
          q.disabled = false;
        }
        gerarParcelas();
      }

      function gerarParcelas() {
        const total =
          parseFloat(document.getElementById("valorTotal").value) || 0;
        const qtd = parseInt(document.getElementById("qtdParcelas").value);
        const container = document.getElementById("listaParcelas");
        if (total <= 0) return;

        container.innerHTML = "";
        const base = Math.floor((total / qtd) * 100) / 100;
        const resto = parseFloat((total - base * qtd).toFixed(2));

        let somaVerificacao = 0;

        for (let i = 1; i <= qtd; i++) {
          const valor = i === 1 ? base + resto : base;
          somaVerificacao += valor;
          const data = new Date(document.getElementById("dataVenda").value);
          data.setMonth(data.setMonth() + (i - 1));

          container.innerHTML += `
                    <tr>
                        <td class="p-2 font-bold">${i}</td>
                        <td class="p-2"><input type="date" value="${data.toISOString().split("T")[0]}" class="venc-input border p-1 rounded text-xs outline-none"></td>
                        <td class="p-2 text-right"><input type="number" step="0.01" value="${valor.toFixed(2)}" class="valor-input border p-1 rounded text-right w-24 outline-none" oninput="actualizarSoma()"></td>
                        <td class="p-2 text-center text-gray-400">Pendente</td>
                    </tr>`;
        }
        actualizarSoma();
      }

      function actualizarSoma() {
        let soma = 0;
        document
          .querySelectorAll(".valor-input")
          .forEach((i) => (soma += parseFloat(i.value) || 0));
        document.getElementById("labelSoma").innerText =
          `Soma: R$ ${soma.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}`;
      }

      function salvar() {
        const btn = document.getElementById("btnSalvar");
        const venda = {
          idVenda: document.getElementById("idVenda").value,
          cliente: document.getElementById("cliente").value,
          dataVenda: document.getElementById("dataVenda").value,
          valorTotal: parseFloat(document.getElementById("valorTotal").value),
          formaPagamento: document.getElementById("formaPagamento").value,
          saldoDevedor: parseFloat(document.getElementById("valorTotal").value),
          status: "EM ABERTO",
        };

        const parcelas = [];
        const rows = document.querySelectorAll("#listaParcelas tr");

        rows.forEach((r, i) => {
          const inputValor = r.querySelector(".valor-input");
          if (inputValor) {
            parcelas.push({
              numero: i + 1,
              vencimento: r.querySelector(".venc-input").value,
              valor: parseFloat(inputValor.value),
              status: "PENDENTE",
            });
          }
        });

        if (
          !venda.idVenda ||
          !venda.cliente ||
          !venda.valorTotal ||
          parcelas.length === 0
        ) {
          alert("Por favor, preencha o ID, o Cliente e o Valor Total.");
          return;
        }

        btn.disabled = true;
        document.getElementById("loading").classList.remove("hidden");

        google.script.run
          .withSuccessHandler((r) => {
            alert(r.mensagem);
            google.script.host.close();
          })
          .withFailureHandler((e) => {
            alert("Erro técnico: " + e);
            btn.disabled = false;
            document.getElementById("loading").classList.add("hidden");
          })
          .processarGravacao(venda, parcelas);
      }
    </script>
  </body>
</html>
